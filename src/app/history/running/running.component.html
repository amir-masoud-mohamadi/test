<ion-content *ngIf="flagNo"  class="main-all ">

  <ion-grid  class="content-margin" *ngFor="let history of listRunning">

    <ion-row>
      <ion-col class="tarikhrun" size-md="4" offset-md="4" size-xs="12">
        <p style="float: left">{{history.date_created}} / {{history.date_modified}}</p> <p>شماره سفارش:{{history.id}}</p>
      </ion-col>
    </ion-row>
    <ion-row >
      <ion-col class="rowrun box " size-md="4" offset-md="4" size-xs="12">

          <ul class="li2rec">

            <li class="li-padding"> {{history.shipping.address_1}}</li>
          </ul>

        <img class="shop-img" src="{{history.line_items[0].product_data.images[0].src}}" alt="">
        <div class="shop-all">
          <p class="shop-p2">{{history.line_items[0].name}}</p>
        </div>
        <div class="hazinerun">
          <p class="prun"><span class="spanrun">هزینه نهایی</span><br> {{  history.total | number:'3.0-0' }} </p>
        </div>
      </ion-col>
    </ion-row>

  </ion-grid>

</ion-content>
<ion-content *ngIf="!flagNo" class="main-all ">
  <ion-grid >
    <h2 style="text-align: center;margin-top: 12%">
      در حال حاضر سفارش در حال انجام وجود ندارد
    </h2>
  </ion-grid>
</ion-content>
